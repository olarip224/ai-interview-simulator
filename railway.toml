[build]
builder = "dockerfile"
dockerfilePath = "backend/docker/Dockerfile"

[deploy]
# TEMPORARY diagnostic: migration skipped on purpose to isolate whether ANY
# process survives on Railway, or if it's specific to the migration step.
# Revert to "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000} --workers 1"
# once this test is done.
startCommand = "echo 'DIAG: skipping migration, starting bare uvicorn' && uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000} --workers 1"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
