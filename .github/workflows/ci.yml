name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aiinterviewer
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/aiinterviewer
      SECRET_KEY: ci-test-secret-key-not-used-in-production
      ANTHROPIC_API_KEY: sk-ant-placeholder-mocked-in-tests
      REDIS_URL: redis://localhost:6379/0
      SKIP_STARTUP_VALIDATION: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system dependencies
        run: sudo apt-get install -y --no-install-recommends libmagic1

      - name: Install Python dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Create test database
        run: PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE aiinterviewer_test;"

      - name: Run tests
        run: python -m pytest -v
        working-directory: backend
