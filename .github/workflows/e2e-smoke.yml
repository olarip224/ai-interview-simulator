name: E2E Smoke Test

# Manually triggered against a live URL (e.g. the deployed Vercel site) — not run
# on every push, since it needs a real backend + database behind that URL and
# hits the real Claude API (register → upload resume → run interview → analytics).
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'URL to test against (e.g. https://your-app.vercel.app)'
        required: true

jobs:
  smoke:
    name: Playwright smoke test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke test
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: ${{ inputs.base_url }}
